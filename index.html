<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Planeta Shake - Edição Foco e Controle</title>
    <style>
        * { touch-action: none; box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { margin: 0; padding: 0; width: 100%; height: 100%; background: #020205; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #fff; }
        #game-container { position: relative; width: 100vw; height: 100vh; background: radial-gradient(circle at center, #2e1a99 0%, #05051a 100%); overflow: hidden; }
        #main-logo { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 120px; z-index: 100; opacity: 0.9; pointer-events: none; }
        #fullscreen-btn { position: absolute; top: 15px; left: 15px; z-index: 110; background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255, 255, 255, 0.3); color: #fff; padding: 10px 18px; border-radius: 25px; font-weight: bold; cursor: pointer; font-size: 0.7rem; backdrop-filter: blur(4px); }
        #ui-right-cluster { position: absolute; top: 15px; right: 15px; display: flex; flex-direction: column; align-items: flex-end; z-index: 100; }
        .orange-ui { color: #fc845d; font-weight: 900; font-size: 1.2rem; text-shadow: 2px 2px #000; }
        #lives-container { display: flex; gap: 6px; margin-top: 5px; }
        .life-icon { width: 20px; height: 20px; background-image: url('vida.png'); background-size: contain; background-repeat: no-repeat; filter: drop-shadow(0 0 5px #00ff00); }
        #ship { position: absolute; width: 45px; height: 35px; background-image: url('nave.png'); background-size: contain; background-repeat: no-repeat; z-index: 50; left: 50%; bottom: 100px; transform: translateX(-50%) rotate(-38deg); filter: drop-shadow(0 0 10px #00f2ff); transition: filter 0.1s; will-change: left; }
        .glow-shake { filter: drop-shadow(0 0 25px #fc845d) brightness(1.5) !important; }
        .glow-life { filter: drop-shadow(0 0 25px #00ff00) brightness(1.5) !important; }
        .glow-damage { filter: drop-shadow(0 0 25px #ff0000) brightness(1.5) !important; }
        .obj { position: absolute; z-index: 40; background-size: contain; background-repeat: no-repeat; }
        .obj-milkshake { animation: pulse-orange 0.8s infinite alternate ease-in-out; }
        .obj-life { animation: pulse-green 0.8s infinite alternate ease-in-out; }
        @keyframes pulse-orange { from { filter: drop-shadow(0 0 5px rgba(252, 132, 93, 0.7)); } to { filter: drop-shadow(0 0 15px #fc845d) drop-shadow(0 0 5px #fff); } }
        @keyframes pulse-green { from { filter: drop-shadow(0 0 5px rgba(0, 255, 0, 0.7)); } to { filter: drop-shadow(0 0 15px #00ff00) drop-shadow(0 0 5px #fff); } }
        #msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(5, 5, 26, 0.98); padding: 35px; border-radius: 25px; color: #f8f9f9; text-align: center; display: none; z-index: 200; width: 80%; max-width: 350px; border: 2px solid #4f2bd0; }
        .restart-btn { padding: 15px 30px; background: #fc845d; border: none; font-weight: bold; border-radius: 50px; color: #fff; cursor: pointer; margin-top: 20px; width: 100%; font-size: 1rem; }
        .star { position: absolute; background: #fff; border-radius: 50%; opacity: 0.3; pointer-events: none; z-index: 1; }
    </style>
</head>
<body>
    <div id="game-container">
        <button id="fullscreen-btn" onclick="toggleFullscreen()">TELA CHEIA</button>
        <img src="logo.png" id="main-logo">
        <div id="ui-right-cluster">
            <div class="orange-ui">Shake: <span id="score">0</span></div>
            <div id="lives-container"></div>
        </div>
        <div id="ship"></div>
        <div id="msg">
            <img src="logo.png" style="width: 140px; margin-bottom: 15px;">
            <h1 style="color: #fc845d; margin: 0;">COLISÃO FATAL</h1>
            <p id="final-stats" style="font-size: 1.2rem; margin: 15px 0;"></p>
            <button class="restart-btn" onclick="resetGame()">REINICIAR</button>
        </div>
    </div>

<script>
    let audioCtx, active = true, spawnTimeout;
    let score = 0, lives = 2, speed = 3; // Velocidade inicial reduzida para 3
    const ship = document.getElementById('ship'), container = document.getElementById('game-container');

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function toggleFullscreen() {
        initAudio();
        if (!document.fullscreenElement) container.requestFullscreen().catch(()=>{});
        else document.exitFullscreen();
    }

    function triggerShipGlow(type) {
        ship.classList.remove('glow-shake', 'glow-life', 'glow-damage');
        void ship.offsetWidth;
        ship.classList.add('glow-' + type);
        setTimeout(() => ship.classList.remove('glow-' + type), 200);
    }

    function playSfx(freq, type, vol, dur = 0.3) {
        if(!audioCtx) return;
        const o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = type; o.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); o.stop(audioCtx.currentTime + dur);
    }

    function spawn() {
        if(!active) return;
        const obj = document.createElement('div');
        obj.className = 'obj';
        const rand = Math.random();
        let type;
        if(rand < 0.3) {
            type = 'shake'; obj.classList.add('obj-milkshake');
            obj.style.backgroundImage = "url('milkshake.png')";
            obj.style.width = '36px'; obj.style.height = '46px';
        } else if(rand < 0.38) {
            type = 'life'; obj.classList.add('obj-life');
            obj.style.backgroundImage = "url('vida.png')";
            obj.style.width = '35px'; obj.style.height = '35px';
        } else {
            type = 'bad';
            const imgs = ['planeta.png', 'venus.png', 'meteoro.png', 'foguete.png'];
            obj.style.backgroundImage = `url('${imgs[Math.floor(Math.random()*4)]}')`;
            obj.style.width = obj.style.height = '45px';
        }
        obj.style.left = Math.random() * (container.offsetWidth - 50) + 'px';
        obj.style.top = '-60px'; container.appendChild(obj);

        let pos = -60;
        function fall() {
            if(!active) { obj.remove(); return; }
            pos += speed; obj.style.top = pos + 'px';
            const r1 = ship.getBoundingClientRect(), r2 = obj.getBoundingClientRect();
            if(!(r1.right < r2.left+5 || r1.left > r2.right-5 || r1.bottom < r2.top+5 || r1.top > r2.bottom-5)) {
                if(type === 'shake') { 
                    score++; document.getElementById('score').innerText = score;
                    playSfx(880, 'sine', 0.1); triggerShipGlow('shake');
                } else if(type === 'life') {
                    if(lives < 3) { lives++; updateLives(); playSfx(1200, 'sine', 0.1); triggerShipGlow('life'); }
                } else {
                    lives--; updateLives(); 
                    playSfx(100, 'sawtooth', 0.25, 0.4); // Som de colisão mantido
                    triggerShipGlow('damage');
                    if(lives <= 0) gameOver();
                }
                obj.remove(); return;
            }
            if(pos > window.innerHeight) obj.remove(); else requestAnimationFrame(fall);
        }
        fall();
        spawnTimeout = setTimeout(spawn, 800);
    }

    function updateLives() {
        const div = document.getElementById('lives-container');
        div.innerHTML = '';
        for(let i=0; i<lives; i++) {
            const icon = document.createElement('div'); icon.className = 'life-icon';
            div.appendChild(icon);
        }
    }

    function gameOver() {
        active = false; clearTimeout(spawnTimeout);
        playSfx(60, 'square', 0.3, 1.5); 
        document.getElementById('msg').style.display = 'block';
        document.getElementById('final-stats').innerText = `Shakes coletados: ${score}`;
        ship.style.display = 'none';
    }

    function resetGame() {
        score = 0; lives = 2; speed = 3; active = true;
        document.getElementById('score').innerText = '0';
        document.getElementById('msg').style.display = 'none';
        ship.style.display = 'block'; ship.style.left = '50%';
        updateLives(); spawn(); initAudio();
    }

    function move(e) {
        initAudio();
        if(!active) return;
        const x = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
        const rect = container.getBoundingClientRect();
        let nx = x - rect.left;
        nx = Math.max(25, Math.min(container.offsetWidth - 25, nx));
        ship.style.left = nx + 'px';
    }

    container.addEventListener('mousemove', move);
    container.addEventListener('touchstart', move);
    container.addEventListener('touchmove', (e) => { if(active) e.preventDefault(); move(e); }, {passive: false});

    updateLives(); spawn();
    for(let i=0; i<40; i++) {
        const s = document.createElement('div'); s.className = 'star';
        s.style.width = s.style.height = Math.random()*3+'px';
        s.style.left = Math.random()*100+'%'; s.style.top = Math.random()*100+'%';
        container.appendChild(s);
    }
</script>
</body>
</html>
